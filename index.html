<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FilmHub - Movie Gallery</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="header-content">
      <div class="logo">FilmHub</div>
      <div class="header-title">Movie Gallery</div>
    </div>
  </header>

  <!-- Main Container -->
  <div class="container">
    <!-- Sidebar - Movie Grid -->
    <aside class="sidebar">
      <h2 class="sidebar-title">Movies</h2>
      <div class="movies-grid" id="moviesGrid">
        <!-- Movie thumbnails will be generated here -->
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <article class="movie-detail" id="movieDetail">
        <!-- Poster Section -->
        <div class="poster-section">
          <div class="poster-container" id="posterContainer">
            <div class="poster-placeholder" id="posterPlaceholder">
              No Image Selected
            </div>
            <img id="posterImage" src="" alt="Movie Poster" style="display: none;">
          </div>

          <!-- Upload Section -->
          <div class="upload-section">
            <label for="fileInput" class="file-input-label">Upload Poster</label>
            <input
              type="file"
              id="fileInput"
              accept="image/jpeg,image/png,image/webp,image/gif"
            />
            <div class="file-info">
              JPG, PNG, WebP or GIF • Max 5MB
            </div>
          </div>
        </div>

        <!-- Info Section -->
        <div class="info-section" id="infoSection">
          <!-- Movie details will be generated here -->
        </div>
      </article>
    </main>
  </div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
